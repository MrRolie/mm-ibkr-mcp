name: mm-ibkr-stack

services:
  ib-gateway-live:
    image: ghcr.io/gnzsnz/ib-gateway:stable
    container_name: mm-ibkr-gateway-live
    restart: always
    environment:
      TWS_USERID: ${TWS_USERID_LIVE}
      TWS_PASSWORD: ${TWS_PASSWORD_LIVE}
      TRADING_MODE: live
      TWS_SETTINGS_PATH: /home/ibgateway/tws_settings
      TWOFA_TIMEOUT_ACTION: restart
      RELOGIN_AFTER_TWOFA_TIMEOUT: "yes"
      TWOFA_EXIT_INTERVAL: 60
      AUTO_RESTART_TIME: "11:45 PM"
      EXISTING_SESSION_DETECTED_ACTION: primary
      TWS_ACCEPT_INCOMING: accept
      VNC_SERVER_PASSWORD: ${VNC_PASSWORD}
      TIME_ZONE: ${TIME_ZONE:-America/Toronto}
      TZ: ${TIME_ZONE:-America/Toronto}
    volumes:
      - ./config/tws_settings/live:/home/ibgateway/tws_settings
    ports:
      - "127.0.0.1:4001:4003"
      - "127.0.0.1:5900:5900"
    networks:
      - ibkr-network
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/4003'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

  ib-gateway-paper:
    image: ghcr.io/gnzsnz/ib-gateway:stable
    container_name: mm-ibkr-gateway-paper
    restart: always
    environment:
      TWS_USERID: ${TWS_USERID_PAPER}
      TWS_PASSWORD: ${TWS_PASSWORD_PAPER}
      TRADING_MODE: paper
      TWS_SETTINGS_PATH: /home/ibgateway/tws_settings
      TWOFA_TIMEOUT_ACTION: restart
      RELOGIN_AFTER_TWOFA_TIMEOUT: "yes"
      TWOFA_EXIT_INTERVAL: 60
      AUTO_RESTART_TIME: "11:50 PM"
      EXISTING_SESSION_DETECTED_ACTION: primary
      TWS_ACCEPT_INCOMING: accept
      VNC_SERVER_PASSWORD: ${VNC_PASSWORD}
      TIME_ZONE: ${TIME_ZONE:-America/Toronto}
      TZ: ${TIME_ZONE:-America/Toronto}
    volumes:
      - ./config/tws_settings/paper:/home/ibgateway/tws_settings
    ports:
      - "127.0.0.1:4002:4004"
      - "127.0.0.1:5901:5900"
    networks:
      - ibkr-network
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/4004'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

networks:
  ibkr-network:
    driver: bridge
